spring.application.name=sample-project-employee

# ===============================
# = DATA SOURCE PROPERTIES
# ===============================
# Set here configurations for the database connection
spring.datasource.url=jdbc:mysql://localhost:3306/employeeTpProject?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=manager
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# =  HIBERNATE PROPERTIES
# ===============================
# Show or not log for each sql query in console
spring.jpa.show-sql=true
# Hibernate ddl auto (create, create-drop, update): with "create-drop" the database
spring.jpa.hibernate.ddl-auto=update
# Allows Hibernate to generate SQL optimized for a particular DBMS
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
server.port=8078

spring.output.ansi.enabled=always

logging.level.root=INFO

# Swagger Url--> http://localhost:8071/swagger-ui/index.html#/

# ===============================
# = JWT PROPERTIES
# ===============================
jwt.secret=MySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLongForHS256Algorithm
#If the JWT is generated at:4 July 2026, 10:00 AM It will expire at:5 July 2026, 10:00 AM
jwt.expiration=86400000